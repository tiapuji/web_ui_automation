name: Web Automation Workflow

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # download repo
      - uses: actions/checkout@v4

      # setup java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # install browser
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2.1.2

      # setup gradle
      - name: Setup Gradlew
        run: chmod +x gradlew

      # execute test
      - name: Execute Test
        run: ./gradlew clean test

      # upload report
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-report
          path: |
            build/reports/**
            reports/**
